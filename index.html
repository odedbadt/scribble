<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link type="text/css" rel="stylesheet" href="static/style.css">
    <script src="distro/main.bundle.js"></script>
    <script src="distro/three_demo.bundle.js"></script>
</head>

<body>
    <!-- Open mobile tool selector immediately on mobile -->
    <script>
    if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 800) {
        document.addEventListener('DOMContentLoaded', function() {
            var toolSel = document.getElementById('mobile-tool-selector');
            if (toolSel) toolSel.classList.add('open');
        });
    }
    </script>
    <script>
    // Mobile tool selector interactions
    document.addEventListener('DOMContentLoaded', function() {
        var toolSel = document.getElementById('mobile-tool-selector');
        if (!toolSel) return;
        let open = toolSel.classList.contains('open');
        function openSelector() {
            if (!open) { toolSel.classList.add('open'); open = true; }
        }
        function closeSelector() {
            if (open) { toolSel.classList.remove('open'); open = false; }
        }
        // Open on swipe from left edge
        let startX = null;
        document.body.addEventListener('touchstart', function(e) {
            if (e.touches[0].clientX < 24) startX = e.touches[0].clientX;
        });
        document.body.addEventListener('touchmove', function(e) {
            if (startX !== null && e.touches[0].clientX - startX > 30) {
                openSelector();
                startX = null;
            }
        });
        document.body.addEventListener('touchend', function() { startX = null; });
        // Close on tap outside
        document.addEventListener('touchstart', function(e) {
            if (open && !toolSel.contains(e.target)) closeSelector();
        }, true);
        // Tool selection
        toolSel.addEventListener('click', function(e) {
            var btn = e.target.closest('[data-tool]');
            if (btn) {
                toolSel.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                if (window.app && window.app.select_tool) window.app.select_tool(btn.dataset.tool);
            }
        });
        // Color selection
        toolSel.addEventListener('click', function(e) {
            var btn = e.target.closest('.mobile-color-btn');
            if (!btn) return;
            toolSel.querySelectorAll('.mobile-color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            var hex = btn.dataset.color.replace('#', '');
            var r = parseInt(hex.substring(0,2), 16);
            var g = parseInt(hex.substring(2,4), 16);
            var b = parseInt(hex.substring(4,6), 16);
            if (window.app && window.app.color_stack) window.app.color_stack.select_color([r,g,b], 'line', true, true, true);
        });
        // Size slider
        var slider = document.getElementById('mobile-size-slider');
        var sizeVal = document.getElementById('mobile-size-val');
        if (slider) {
            slider.addEventListener('input', function() {
                sizeVal.textContent = slider.value;
                if (window.app && window.app.set_line_width) window.app.set_line_width(parseInt(slider.value));
            });
        }
    });
    </script>
    <!-- TOP BAR: menu bar -->
    <div id="top-bar">
        <div id="file-menu" class="top-menu-item">
            <span class="top-menu-label">File</span>
            <div class="top-menu-dropdown">
                <div id="save_button" class="top-menu-action">Save</div>
                <div id="load_button" class="top-menu-action">Load</div>
            </div>
        </div>
    </div>

    <!-- LEFT TOOLBAR: drawing tools + all control buttons -->
    <div id="toolbar">
        <div id="toolbar-page-1">
            <div class="scribble button"><svg class="icon"><use href="static/icons/sprite.svg#pen-pencil"/></svg></div>
            <div class="selection button"><svg class="icon"><use href="static/icons/sprite.svg#selection-rectangle"/></svg></div>
            <div class="stamp button"><svg class="icon"><use href="static/icons/sprite.svg#stamp"/></svg></div>
            <div class="rect button filled fillable"></div>
            <div class="line button"><svg class="icon"><use href="static/icons/sprite.svg#pen-tool-pen"/></svg></div>
            <div class="bezier button fillable"><svg class="icon"><use href="static/icons/sprite.svg#pen-tool-2"/></svg></div>
            <div class="circle button filled fillable"></div>
            <div class="polygon button filled fillable"></div>
            <div class="dropper button"><svg class="icon"><use href="static/icons/sprite.svg#dropper-tools-and-utensils"/></svg></div>
            <div class="floodfill button"><svg class="icon"><use href="static/icons/sprite.svg#paint-bucket-2"/></svg></div>
            <div class="eraser button"><svg class="icon"><use href="static/icons/sprite.svg#eraser-1"/></svg></div>
            <div class="scraper button"><svg class="icon"><use href="static/icons/sprite.svg#scraper"/></svg></div>
            <div class="clearall button"><svg class="icon"><use href="static/icons/sprite.svg#delete"/></svg></div>
            <div class="topo_hull button filled fillable">⊂</div>
        </div>
        <!-- secondary tools, hidden until fold button is pressed -->
        <div id="toolbar-page-2">
            <div class="heart button filled fillable">♥</div>
            <div class="cloud_stamp button">☁</div>
            <div id="stamp-gallery-btn" class="button" title="Stamp Gallery">🖼</div>
            <div class="reveal_brush button" title="Reveal Brush — sweep to reveal invisible ink">👁</div>
        </div>
        <div id="toolbar-fold-btn" class="button">▼</div>
        <!-- control buttons: 2-per-row grid below tools -->
        <div id="toolbar-controls">
            <div id="layers-btn" class="button" title="Toggle layers panel">☰</div>
            <div class="mandala button"></div>
            <div id="anchor-btn" class="anchor button" title="Toggle anchor edit mode"><svg class="icon"><use href="static/icons/sprite.svg#magnet-magnet"/></svg></div>
            <div class="fillstyle filled button"></div>
            <div class="fill_pattern_toggle button" title="Toggle pattern fill"></div>
            <div class="cursor_size button"></div>
            <div id="tool-controls-slot">
                <div id="tool-ctrl-btn" class="button"></div>
                <div id="tool-ctrl-btn-2" class="button"></div>
            </div>
            <div id="undo_button" class="undo button"><svg class="icon"><use href="static/icons/sprite.svg#undo-arrows"/></svg></div>
            <div id="redo_button" class="redo button"><svg class="icon"><use href="static/icons/sprite.svg#redo-arrows"/></svg></div>
            <div id="ghost-mode-btn" class="button" title="Invisible ink mode — draw secretly">👁</div>
            <div id="debug_button" class="button debug-btn"
                onclick="document.getElementById('debug-modal').style.display='flex'">Dbg</div>
        </div>
    </div>

    <!-- layer panel: pops down from top, right of left toolbar -->
    <div id="layer-panel">
        <div id="layer-list"></div>
        <button id="add-layer-btn">＋ Add Layer</button>
    </div>
    <!-- mandala panel: pops right of left toolbar -->
    <div id="mandala-panel">
        <div class="mandala-row">
            <span>n</span>
            <button id="mandala-n-minus" class="mandala-ctrl-btn">-</button>
            <span id="mandala-n-val">8</span>
            <button id="mandala-n-plus" class="mandala-ctrl-btn">+</button>
        </div>
        <div class="mandala-row">
            <span>mirror</span>
            <button id="mandala-mirror" class="mandala-ctrl-btn pressed">on</button>
        </div>
    </div>
    <div id="canvas-area">
        <canvas id="view-canvas" width="300" height="300"></canvas>
    </div>

    <div id="debug-modal" style="display:none">
        <div id="debug-modal-inner">
            <div id="debug-modal-header">
                <span>Debug Canvases</span>
                <button onclick="document.getElementById('debug-modal').style.display='none'">✕</button>
            </div>
            <div id="debug-canvases">
                <div>
                    <div class="debug-label">document-canvas</div><canvas id="document-canvas" width="300"
                        height="300"></canvas>
                </div>
                <div>
                    <div class="debug-label">tool-canvas</div>
                    <div id="debug-tool-canvas-slot"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT TOOLBAR: all color controls, full height -->
    <div id="right-toolbar">
        <!-- hue strip (14px) + SL square (36px) side by side -->
        <div id="color-pickers-row">
            <canvas id="hl-selector-canvas" width="14" height="120"></canvas>
            <canvas id="sat-selector-canvas" width="36" height="120"></canvas>
        </div>
        <!-- color token panel: 8 recolorable paint slots in 2×4 grid -->
        <div id="color-token-panel" title="Color tokens — draw with a slot, then drag palette to retroactively change its color"></div>
        <!-- fore/fill/back indicator — click to swap fore↔back -->
        <div id="color-selector-div-back" title="Click to swap fore ↔ back">
            <div id="color-selector-div-fill">
                <div id="color-selector-div-line"></div>
            </div>
        </div>
        <!-- color history stack — fills remaining space -->
        <div id="color-stack-section">
            <button id="color-stack-live-track" class="button"
                title="Track color while dragging (off = track on release only)">◉</button>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
            <div class="color_stack_item button"></div>
        </div>
    </div>

    <input type="file" id="file_input" accept="image/png" />

    <!-- STAMP GALLERY MODAL -->
    <div id="stamp-gallery-modal" class="gallery-modal-overlay">
        <div class="gallery-modal-inner">
            <div class="gallery-modal-header">
                <span>Stamp Gallery</span>
                <button class="gallery-close-btn"
                    onclick="document.getElementById('stamp-gallery-modal').classList.remove('open')">✕</button>
            </div>
            <p class="gallery-hint">Click a stamp, then drag on the canvas to set its size.</p>
            <div class="gallery-grid"></div>
        </div>
    </div>
    <!-- Minimal floating tool/color selector for mobile -->
    <div id="mobile-tool-selector" style="display:none">
        <!-- Tools row -->
        <div class="mobile-section-label">Tools</div>
        <div class="mobile-tools-row">
            <button class="mobile-tool-btn selected" data-tool="scribble" aria-label="Pen">✏️</button>
            <button class="mobile-tool-btn" data-tool="eraser" aria-label="Eraser">🧹</button>
        </div>
        <!-- Size slider -->
        <div class="mobile-section-label">Size</div>
        <div class="mobile-size-row">
            <input type="range" id="mobile-size-slider" min="1" max="60" value="10" step="1">
            <span id="mobile-size-val">10</span>
        </div>
        <!-- Color palette -->
        <div class="mobile-section-label">Color</div>
        <div class="mobile-palette-grid">
            <button class="mobile-color-btn selected" data-color="#000000" style="background:#000"></button>
            <button class="mobile-color-btn" data-color="#ffffff" style="background:#fff;border:1px solid #ccc"></button>
            <button class="mobile-color-btn" data-color="#808080" style="background:#808080"></button>
            <button class="mobile-color-btn" data-color="#c0c0c0" style="background:#c0c0c0"></button>
            <button class="mobile-color-btn" data-color="#800000" style="background:#800000"></button>
            <button class="mobile-color-btn" data-color="#ff0000" style="background:#f00"></button>
            <button class="mobile-color-btn" data-color="#ff8000" style="background:#f80"></button>
            <button class="mobile-color-btn" data-color="#ffff00" style="background:#ff0"></button>
            <button class="mobile-color-btn" data-color="#008000" style="background:#080"></button>
            <button class="mobile-color-btn" data-color="#00cc00" style="background:#0c0"></button>
            <button class="mobile-color-btn" data-color="#00cccc" style="background:#0cc"></button>
            <button class="mobile-color-btn" data-color="#0066ff" style="background:#06f"></button>
            <button class="mobile-color-btn" data-color="#000080" style="background:#000080"></button>
            <button class="mobile-color-btn" data-color="#8800cc" style="background:#8800cc"></button>
            <button class="mobile-color-btn" data-color="#ff00ff" style="background:#f0f"></button>
            <button class="mobile-color-btn" data-color="#ff80c0" style="background:#f8c"></button>
        </div>
    </div>
</body>

</html>
